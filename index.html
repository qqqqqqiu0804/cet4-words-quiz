<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#409eff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CET4">
<link rel="manifest" href="manifest.json">
<title>四级高频词自测 | 分类刷题 + 错题本</title>
<style>
:root {
  --bg: #f4f6f9;
  --card: #fff;
  --text: #2c3e50;
  --text-secondary: #64748b;
  --border: #e5e7eb;
  --primary: #409eff;
  --primary-hover: #337ecc;
  --success: #67c23a;
  --error: #f56c6c;
  --warning: #e6a23c;
  --input-bg: #fff;
  --tag-bg: #ecf5ff;
  --tag-text: #409eff;
  --shadow: 0 2px 15px rgba(0,0,0,0.1);
  --radius: 8px;
  --transition: .25s ease;
  --disabled-bg: #c0c4cc;
  --hover-bg: #f0f2f5;
  --wrong-bg: #fef0f0;
  --right-bg: #f0f9eb;
  --rewrite-bg: #fff8e1;
  --rewrite-border: #ffc107;
}
[data-theme="dark"] {
  --bg: #1a1a2e;
  --card: #16213e;
  --text: #e0e0e0;
  --text-secondary: #a0aec0;
  --border: #2d3748;
  --primary: #667eea;
  --primary-hover: #5a6fd6;
  --input-bg: #2d3748;
  --tag-bg: #2d3748;
  --tag-text: #a5b4fc;
  --shadow: 0 2px 15px rgba(0,0,0,0.4);
  --disabled-bg: #4a5568;
  --hover-bg: #2d3748;
  --wrong-bg: #3b1c1c;
  --right-bg: #1c3b1c;
  --rewrite-bg: #3d3520;
  --rewrite-border: #ffc107;
}
[data-theme="eye-care"] {
  --bg: #f4ecd8;
  --card: #faf6eb;
  --text: #4a3728;
  --text-secondary: #7a6b5c;
  --border: #d4c5a9;
  --primary: #6b9b5a;
  --primary-hover: #5a8a4a;
  --input-bg: #fef9ee;
  --tag-bg: #e8f5e0;
  --tag-text: #4a7c3f;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --disabled-bg: #c8c0a8;
  --hover-bg: #f5f0e0;
  --wrong-bg: #fce8e6;
  --right-bg: #e6f4e0;
  --rewrite-bg: #fef5e0;
  --rewrite-border: #d4a017;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 16px;
  transition: background var(--transition), color var(--transition);
  min-height: 100vh;
}
.container {
  max-width: 860px;
  margin: 0 auto;
  background: var(--card);
  padding: 28px 24px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  transition: background var(--transition), box-shadow var(--transition);
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; margin-bottom: 20px; padding-bottom: 14px;
  border-bottom: 2px solid var(--primary);
}
.header h1 { font-size: 22px; color: var(--text); }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.theme-btn {
  padding: 6px 12px; font-size: 13px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); cursor: pointer; transition: all var(--transition);
}
.theme-btn:hover { border-color: var(--primary); color: var(--primary); }
.theme-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.stats-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.stat-card {
  flex: 1; min-width: 90px; text-align: center; padding: 12px 8px;
  background: var(--hover-bg); border-radius: var(--radius);
  transition: background var(--transition);
}
.stat-card .num { font-size: 24px; font-weight: 700; }
.stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.stat-card.total .num { color: var(--primary); }
.stat-card.right .num { color: var(--success); }
.stat-card.wrong .num { color: var(--error); }
.stat-card.rate .num { color: var(--warning); }

.cat-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.cat-bar > span { font-size: 13px; color: var(--text-secondary); margin-right: 4px; white-space: nowrap; }
.cat-btn {
  padding: 5px 14px; font-size: 13px; border: 1px solid var(--border);
  border-radius: 20px; background: var(--card); color: var(--text-secondary);
  cursor: pointer; transition: all var(--transition); white-space: nowrap;
}
.cat-btn:hover { border-color: var(--primary); color: var(--primary); }
.cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.tool-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.mode-label { font-size: 13px; color: var(--text-secondary); margin-right: 4px; white-space: nowrap; }

.btn {
  padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 14px; transition: all var(--transition); white-space: nowrap;
  display: inline-flex; align-items: center; gap: 4px;
}
.btn:disabled { background: var(--disabled-bg) !important; cursor: not-allowed; opacity: 0.65; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
.btn-warning { background: var(--warning); color: #fff; }
.btn-warning:hover:not(:disabled) { background: #d49028; }
.btn-danger { background: var(--error); color: #fff; }
.btn-danger:hover:not(:disabled) { background: #e45757; }
.btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover:not(:disabled) { background: var(--primary); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover:not(:disabled) { background: #5daf34; }

.quiz-box {
  margin: 16px 0; padding: 24px; border: 2px solid var(--border);
  border-radius: var(--radius); background: var(--card);
  transition: all var(--transition); position: relative;
}
.quiz-box.correct { border-color: var(--success); background: var(--right-bg); }
.quiz-box.incorrect { border-color: var(--error); background: var(--wrong-bg); }

/* 答错后照打区域 */
.rewrite-box {
  margin-top: 16px; padding: 18px; border: 2px dashed var(--rewrite-border);
  border-radius: var(--radius); background: var(--rewrite-bg);
  animation: fadeInUp .35s ease;
}
.rewrite-box .rewrite-title {
  font-size: 15px; font-weight: 600; color: var(--warning); margin-bottom: 8px;
}
.rewrite-box .rewrite-target {
  font-size: 20px; font-weight: 700; color: var(--primary);
  margin-bottom: 10px; letter-spacing: 1px;
}
.rewrite-box .rewrite-input-row {
  display: flex; gap: 10px;
}
.rewrite-box .rewrite-input-row input {
  flex: 1; padding: 10px 14px; font-size: 16px; border: 2px solid var(--border);
  border-radius: var(--radius); background: var(--input-bg); color: var(--text);
  outline: none; transition: border var(--transition); min-width: 0;
}
.rewrite-box .rewrite-input-row input:focus { border-color: var(--primary); }
.rewrite-box .rewrite-input-row input.match { border-color: var(--success); background: var(--right-bg); }
.rewrite-box .rewrite-input-row input.mismatch { border-color: var(--error); background: var(--wrong-bg); }
.rewrite-feedback { font-size: 14px; margin-top: 8px; min-height: 20px; }

.cat-tag {
  display: inline-block; font-size: 12px; padding: 2px 10px;
  border-radius: 12px; background: var(--tag-bg); color: var(--tag-text); margin-bottom: 12px;
}

.q-text {
  font-size: 20px; margin: 12px 0; color: var(--text);
  min-height: 30px; line-height: 1.6; word-break: break-word;
}

.input-row { display: flex; gap: 10px; margin: 12px 0; }
.input-row input {
  flex: 1; padding: 10px 14px; font-size: 16px; border: 2px solid var(--border);
  border-radius: var(--radius); background: var(--input-bg); color: var(--text);
  outline: none; transition: border var(--transition); min-width: 0;
}
.input-row input:focus { border-color: var(--primary); }

.result {
  margin-top: 12px; font-size: 16px; font-weight: 500;
  min-height: 24px; opacity: 0; transition: opacity .3s ease;
}
.result.show { opacity: 1; }
.result.right { color: var(--success); }
.result.wrong { color: var(--error); }
.result .paraphrase { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

.nav-bar { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.nav-bar .nav-info { font-size: 13px; color: var(--text-secondary); margin: 0 8px; }

.error-panel {
  margin-top: 20px; border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; transition: all var(--transition);
}
.error-panel-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; background: var(--hover-bg); cursor: pointer;
  user-select: none; transition: background var(--transition);
}
.error-panel-header:hover { opacity: 0.9; }
.error-panel-header h2 { font-size: 16px; color: var(--text); }
.error-panel-header .arrow { transition: transform var(--transition); font-size: 12px; }
.error-panel.open .error-panel-header .arrow { transform: rotate(180deg); }
.error-panel-body { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
.error-panel.open .error-panel-body { max-height: 600px; overflow-y: auto; }

.error-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 18px; border-bottom: 1px solid var(--border);
  font-size: 14px; gap: 8px; flex-wrap: wrap;
}
.error-item:last-child { border-bottom: none; }
.error-item .word-pair { flex: 1; min-width: 0; }
.error-item .word-pair .en { color: var(--primary); font-weight: 500; }
.error-item .word-pair .cn { color: var(--text-secondary); margin-left: 8px; }
.error-item .error-count { font-size: 12px; color: var(--error); white-space: nowrap; }

.empty-state { text-align: center; padding: 32px 16px; color: var(--text-secondary); font-size: 14px; }

@media (max-width: 600px) {
  .container { padding: 16px 12px; }
  .header h1 { font-size: 18px; }
  .quiz-box { padding: 16px; }
  .q-text { font-size: 17px; }
  .input-row, .rewrite-box .rewrite-input-row { flex-direction: column; }
  .input-row .btn, .rewrite-box .rewrite-input-row .btn { width: 100%; }
  .stat-card .num { font-size: 20px; }
  .btn { padding: 8px 12px; font-size: 13px; }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.quiz-box { animation: fadeInUp .35s ease; }
.rewrite-box { animation: fadeInUp .35s ease; }

/* 新增样式 */
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.quiz-actions { display: flex; gap: 6px; }
.difficulty-tag { display: inline-block; font-size: 12px; padding: 2px 10px; border-radius: 12px; background: #fff8e1; color: #ffc107; }
.example-text { font-size: 14px; color: var(--text-secondary); margin: 8px 0; padding: 10px; background: var(--hover-bg); border-radius: var(--radius); font-style: italic; }

.favorite-panel, .daily-goal-panel, .tools-panel, .keyboard-help {
  margin-top: 20px; border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; transition: all var(--transition); background: var(--card);
}
.favorite-panel-header, .daily-goal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; background: var(--hover-bg); cursor: pointer; user-select: none;
}
.favorite-panel-header h2, .daily-goal-header h2 { font-size: 16px; color: var(--text); margin: 0; }
.favorite-panel-body { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
.favorite-panel.open .favorite-panel-body { max-height: 600px; overflow-y: auto; }
.favorite-panel.open .favorite-panel-header .arrow { transform: rotate(180deg); }

.goal-progress { font-size: 14px; color: var(--text-secondary); }
.goal-progress input { width: 60px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; text-align: center; }
.goal-bar { height: 8px; background: var(--hover-bg); border-radius: 4px; margin: 12px 18px; overflow: hidden; }
.goal-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width .3s ease; }
.goal-stats { display: flex; gap: 16px; padding: 0 18px 14px; font-size: 13px; color: var(--text-secondary); }

.tools-panel { padding: 14px 18px; }
.tools-panel h2 { font-size: 16px; margin: 0 0 12px; }
.tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }

.keyboard-help { padding: 14px 18px; }
.keyboard-help h3 { font-size: 14px; margin: 0 0 10px; color: var(--text-secondary); }
.shortcut-list { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-secondary); }
kbd { padding: 2px 6px; background: var(--hover-bg); border: 1px solid var(--border); border-radius: 4px; font-family: monospace; font-size: 11px; }

.favorite-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 18px; border-bottom: 1px solid var(--border); font-size: 14px;
}
.favorite-item:last-child { border-bottom: none; }
.favorite-item .word-pair { flex: 1; min-width: 0; }
.favorite-item .word-pair .en { color: var(--primary); font-weight: 500; }
.favorite-item .word-pair .cn { color: var(--text-secondary); margin-left: 8px; }

#favBtn.active { background: #ffc107; color: #fff; border-color: #ffc107; }

@media (max-width: 600px) {
  .quiz-header { flex-direction: column; gap: 8px; align-items: flex-start; }
  .quiz-actions { width: 100%; justify-content: flex-end; }
  .goal-stats { flex-direction: column; gap: 4px; }
  .tools-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📖 大学英语四级高频词 智能自测</h1>
    <div class="header-actions">
      <button class="theme-btn active" onclick="setTheme('light')">☀ 日间</button>
      <button class="theme-btn" onclick="setTheme('dark')">🌙 夜间</button>
      <button class="theme-btn" onclick="setTheme('eye-care')">🍃 护眼</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card total"><div class="num" id="totalCount">0</div><div class="label">总答题数</div></div>
    <div class="stat-card right"><div class="num" id="rightCount">0</div><div class="label">答对数</div></div>
    <div class="stat-card wrong"><div class="num" id="wrongCount">0</div><div class="label">答错数</div></div>
    <div class="stat-card rate"><div class="num" id="rateText">0%</div><div class="label">正确率</div></div>
  </div>

  <div class="cat-bar">
    <span>分类选题：</span>
    <button class="cat-btn active" onclick="setCategory('all')">全部</button>
    <button class="cat-btn" onclick="setCategory('politics')">时政</button>
    <button class="cat-btn" onclick="setCategory('tech')">科技</button>
    <button class="cat-btn" onclick="setCategory('culture')">社会文化</button>
    <button class="cat-btn" onclick="setCategory('campus')">校园</button>
    <button class="cat-btn" onclick="setCategory('medical')">医疗</button>
    <button class="cat-btn" onclick="setCategory('economy')">经济</button>
    <button class="cat-btn" onclick="setCategory('environment')">环保</button>
    <button class="cat-btn" onclick="setCategory('writing')">写作</button>
    <button class="cat-btn" onclick="setCategory('research')">科研</button>
  </div>

  <div class="tool-bar">
    <span class="mode-label">当前模式：<strong id="modeText">中译英</strong></span>
    <button class="btn btn-outline btn-sm" onclick="switchMode('cn2en')">中译英</button>
    <button class="btn btn-outline btn-sm" onclick="switchMode('en2cn')">英译中</button>
    <span style="flex:1"></span>
    <span class="mode-label">刷题：</span>
    <button class="btn btn-outline btn-sm" id="modeSeqBtn" onclick="toggleSeqMode()">顺序</button>
    <button class="btn btn-outline btn-sm" id="modeRandBtn" onclick="toggleSeqMode()">随机</button>
    <span style="flex:1"></span>
    <span class="mode-label">难度：</span>
    <button class="btn btn-outline btn-sm" id="diffAllBtn" onclick="setDifficulty('all')">全部</button>
    <button class="btn btn-outline btn-sm" id="diff1Btn" onclick="setDifficulty(1)">★</button>
    <button class="btn btn-outline btn-sm" id="diff2Btn" onclick="setDifficulty(2)">★★</button>
    <button class="btn btn-outline btn-sm" id="diff3Btn" onclick="setDifficulty(3)">★★★</button>
  </div>

  <div class="quiz-box" id="quizBox">
    <div class="quiz-header">
      <div class="cat-tag" id="catTag" style="display:none"></div>
      <div class="difficulty-tag" id="diffTag" style="display:none"></div>
      <div class="quiz-actions">
        <button class="btn btn-outline btn-sm" id="favBtn" onclick="toggleFavorite()" title="收藏">☆</button>
        <button class="btn btn-outline btn-sm" id="speakBtn" onclick="speakWord()" title="发音">🔊</button>
        <button class="btn btn-outline btn-sm" id="exampleBtn" onclick="toggleExample()" title="例句">📝</button>
      </div>
    </div>
    <div class="q-text" id="question">请点击下方按钮开始答题</div>
    <div class="example-text" id="exampleText" style="display:none"></div>
    <div class="input-row" id="answerRow">
      <input type="text" id="userInput" placeholder="在此输入答案，按回车提交" autocomplete="off">
      <button class="btn btn-primary" id="submitBtn" onclick="checkAnswer()">提交答案</button>
    </div>
    <div class="result" id="resText"></div>
    <!-- 答错后照打区域 -->
    <div id="rewriteArea" style="display:none"></div>
    <div class="nav-bar">
      <button class="btn btn-outline btn-sm" id="prevBtn" onclick="prevQuestion()" disabled>◀ 上一题</button>
      <span class="nav-info" id="navInfo"></span>
      <button class="btn btn-outline btn-sm" id="nextBtn" onclick="nextQuestion()" disabled>下一题 ▶</button>
      <span style="flex:1"></span>
      <button class="btn btn-primary btn-sm" onclick="getQuestion()">随机抽题</button>
      <button class="btn btn-warning btn-sm" onclick="redoError()">重做错题</button>
      <button class="btn btn-danger btn-sm" onclick="clearErrors()">清空错题本</button>
    </div>
  </div>

  <div class="error-panel" id="errorPanel">
    <div class="error-panel-header" onclick="toggleErrorPanel()">
      <h2>📋 错题本（<span id="errorCount">0</span>题）</h2>
      <span class="arrow">▼</span>
    </div>
    <div class="error-panel-body" id="errorBody"></div>
  </div>

  <div class="favorite-panel" id="favoritePanel">
    <div class="favorite-panel-header" onclick="toggleFavoritePanel()">
      <h2>⭐ 收藏夹（<span id="favoriteCount">0</span>词）</h2>
      <span class="arrow">▼</span>
    </div>
    <div class="favorite-panel-body" id="favoriteBody"></div>
  </div>

  <div class="daily-goal-panel" id="dailyGoalPanel">
    <div class="daily-goal-header">
      <h2>🎯 今日目标</h2>
      <div class="goal-progress">
        <span id="goalProgress">0</span> / <input type="number" id="dailyGoalInput" value="30" min="1" max="200" onchange="updateDailyGoal()">
      </div>
    </div>
    <div class="goal-bar">
      <div class="goal-fill" id="goalFill" style="width: 0%"></div>
    </div>
    <div class="goal-stats">
      <span>已答：<span id="todayAnswered">0</span></span>
      <span>正确：<span id="todayCorrect">0</span></span>
      <span>正确率：<span id="todayRate">0%</span></span>
    </div>
  </div>

  <div class="tools-panel">
    <h2>🛠️ 工具</h2>
    <div class="tools-grid">
      <button class="btn btn-outline" onclick="exportErrors()">📤 导出错题本</button>
      <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📥 导入错题本</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importErrors(event)">
      <button class="btn btn-outline" onclick="exportFavorites()">📤 导出收藏</button>
      <button class="btn btn-outline" onclick="document.getElementById('importFavFile').click()">📥 导入收藏</button>
      <input type="file" id="importFavFile" accept=".json" style="display:none" onchange="importFavorites(event)">
    </div>
  </div>

  <div class="keyboard-help">
    <h3>⌨️ 快捷键</h3>
    <div class="shortcut-list">
      <span><kbd>Enter</kbd> 提交答案</span>
      <span><kbd>Esc</kbd> 清空输入</span>
      <span><kbd>←</kbd><kbd>→</kbd> 上/下一题</span>
      <span><kbd>Space</kbd> 随机抽题</span>
      <span><kbd>S</kbd> 发音</span>
      <span><kbd>F</kbd> 收藏</span>
    </div>
  </div>
  </div>

  <div style="text-align:center; padding:12px 0; color:var(--text-secondary); font-size:12px;">
    -来自小秋的claudecode
  </div>

<script>
// ==================== 词库（9大分类，完整版） ====================
const wordList = [

function saveState() {
  const toSave = {
    mode: state.mode, category: state.category, difficulty: state.difficulty,
    isSeqMode: state.isSeqMode, seqIndex: state.seqIndex, errorList: state.errorList,
    favorites: state.favorites, totalAnswered: state.totalAnswered,
    rightAnswered: state.rightAnswered, wrongAnswered: state.wrongAnswered,
    theme: state.theme, dailyGoal: state.dailyGoal, todayAnswered: state.todayAnswered,
    todayCorrect: state.todayCorrect, todayDate: state.todayDate,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state.mode = saved.mode || "cn2en";
      state.category = saved.category || "all";
      state.difficulty = saved.difficulty || "all";
      state.isSeqMode = saved.isSeqMode || false;
      state.seqIndex = saved.seqIndex ?? -1;
      state.errorList = saved.errorList || [];
      state.favorites = saved.favorites || [];
      state.totalAnswered = saved.totalAnswered || 0;
      state.rightAnswered = saved.rightAnswered || 0;
      state.wrongAnswered = saved.wrongAnswered || 0;
      state.theme = saved.theme || "light";
      state.dailyGoal = saved.dailyGoal || 30;
      state.todayAnswered = saved.todayAnswered || 0;
      state.todayCorrect = saved.todayCorrect || 0;
      state.todayDate = saved.todayDate || "";
    }
  } catch(e) {}
}

// ==================== 模糊匹配 ====================
function normalize(str) {
  return str
    .replace(/[\uFF01-\uFF5E]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
    .replace(/\s+/g, " ")
    .trim()
    .replace(/^[.,!?;:'"\-，。！？；：'""'、]+|[.,!?;:'"\-，。！？；：'""'、]+$/g, "")
    .toLowerCase();
}

function isFuzzyMatch(userAns, correctAns) {
  const u = normalize(userAns);
  const c = normalize(correctAns);
  if (u === c) return true;

  // 同义词/简写映射（双向）
  const pairs = [
    ["ai","人工智能"], ["人工智能","ai"],
    ["脱贫，扶贫","脱贫"], ["脱贫，扶贫","扶贫"], ["脱贫","脱贫，扶贫"], ["扶贫","脱贫，扶贫"],
    ["新能源，可再生能源","新能源"], ["新能源，可再生能源","可再生能源"],
    ["新能源","新能源，可再生能源"], ["可再生能源","新能源，可再生能源"],
    ["大语言模型","llm"], ["llm","大语言模型"],
    ["虚拟现实","vr"], ["vr","虚拟现实"],
    ["混合现实","mr"], ["mr","混合现实"],
    ["增强现实","ar"], ["ar","增强现实"],
    ["物联网","iot"], ["iot","物联网"],
    ["简历","cv"], ["cv","简历"],
    ["无人驾驶汽车","driverless car"], ["无人驾驶汽车","self-driving car"],
    ["无人驾驶汽车","autonomous vehicle"],
    ["辞职","resign"], ["resign","辞职"],
    ["传统的","conventional"], ["conventional","传统的"],
    ["象征","symbolize"], ["symbolize","象征"],
    ["仪式","ritual"], ["ritual","仪式"],
    ["大学","university"], ["university","大学"],
    ["博士学位","phd"], ["phd","博士学位"],
    ["导师","instructor"], ["instructor","导师"],
    ["肥胖的","obese"], ["obese","肥胖的"],
    ["高血压","hypertension"], ["hypertension","高血压"],
    ["税","taxation"], ["taxation","税"],
    ["健康","fitness"], ["fitness","健康"],
    ["药物","medicine"], ["medicine","药物"],
    ["调查","study"], ["study","调查"],
    ["申请","request"], ["request","申请"],
    ["论文，短文","essay"], ["essay","论文，短文"],
    ["公告","announcement"], ["announcement","公告"],
  ];
  for (const [a, b] of pairs) {
    if (normalize(a) === u && normalize(b) === c) return true;
    if (normalize(a) === c && normalize(b) === u) return true;
  }
  return false;
}

// ==================== 严格匹配（照打阶段用） ====================
function isStrictMatch(userAns, correctAns) {
  return normalize(userAns) === normalize(correctAns);
}

// ==================== UI 更新 ====================
function updateStats() {
  document.getElementById("totalCount").innerText = state.totalAnswered;
  document.getElementById("rightCount").innerText = state.rightAnswered;
  document.getElementById("wrongCount").innerText = state.wrongAnswered;
  const rate = state.totalAnswered > 0
    ? Math.round((state.rightAnswered / state.totalAnswered) * 100) : 0;
  document.getElementById("rateText").innerText = rate + "%";
  document.getElementById("errorCount").innerText = state.errorList.length;
  document.getElementById("favoriteCount").innerText = state.favorites.length;
  updateDailyGoalUI();
}

function updateDailyGoalUI() {
  const today = new Date().toDateString();
  if (state.todayDate !== today) {
    state.todayDate = today;
    state.todayAnswered = 0;
    state.todayCorrect = 0;
    saveState();
  }
  document.getElementById("goalProgress").innerText = state.todayAnswered;
  document.getElementById("todayAnswered").innerText = state.todayAnswered;
  document.getElementById("todayCorrect").innerText = state.todayCorrect;
  const rate = state.todayAnswered > 0
    ? Math.round((state.todayCorrect / state.todayAnswered) * 100) : 0;
  document.getElementById("todayRate").innerText = rate + "%";
  const progress = Math.min(100, (state.todayAnswered / state.dailyGoal) * 100);
  document.getElementById("goalFill").style.width = progress + "%";
  document.getElementById("dailyGoalInput").value = state.dailyGoal;
}

function updateDailyGoal() {
  const input = document.getElementById("dailyGoalInput");
  const goal = parseInt(input.value) || 30;
  state.dailyGoal = Math.max(1, Math.min(200, goal));
  input.value = state.dailyGoal;
  updateDailyGoalUI();
  saveState();
}

function speakWord() {
  if (!state.currentWord) return;
  const text = state.mode === "cn2en" ? state.currentWord.en : state.currentWord.cn;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = state.mode === "cn2en" ? "en-US" : "zh-CN";
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
  }
}

function toggleExample() {
  if (!state.currentWord) return;
  state.showExample = !state.showExample;
  const exampleText = document.getElementById("exampleText");
  const exampleBtn = document.getElementById("exampleBtn");
  if (state.showExample && state.currentWord.example) {
    exampleText.innerText = "例句：" + state.currentWord.example;
    exampleText.style.display = "block";
    exampleBtn.classList.add("active");
    exampleBtn.style.background = "var(--primary)";
    exampleBtn.style.color = "#fff";
  } else {
    exampleText.style.display = "none";
    exampleBtn.classList.remove("active");
    exampleBtn.style.background = "";
    exampleBtn.style.color = "";
  }
}

function toggleFavorite() {
  if (!state.currentWord) return;
  const existIdx = state.favorites.findIndex(
    f => f.en === state.currentWord.en && f.cn === state.currentWord.cn
  );
  const favBtn = document.getElementById("favBtn");
  if (existIdx >= 0) {
    state.favorites.splice(existIdx, 1);
    favBtn.innerText = "☆";
    favBtn.classList.remove("active");
    favBtn.style.background = "";
    favBtn.style.color = "";
  } else {
    state.favorites.push({
      en: state.currentWord.en,
      cn: state.currentWord.cn,
      cat: state.currentWord.cat,
      note: state.currentWord.note || "",
      difficulty: state.currentWord.difficulty || 1,
      example: state.currentWord.example || ""
    });
    favBtn.innerText = "★";
    favBtn.classList.add("active");
    favBtn.style.background = "#ffc107";
    favBtn.style.color = "#fff";
  }
  updateStats();
  renderFavoritePanel();
  saveState();
}

function updateFavBtnState() {
  if (!state.currentWord) return;
  const existIdx = state.favorites.findIndex(
    f => f.en === state.currentWord.en && f.cn === state.currentWord.cn
  );
  const favBtn = document.getElementById("favBtn");
  if (existIdx >= 0) {
    favBtn.innerText = "★";
    favBtn.classList.add("active");
    favBtn.style.background = "#ffc107";
    favBtn.style.color = "#fff";
  } else {
    favBtn.innerText = "☆";
    favBtn.classList.remove("active");
    favBtn.style.background = "";
    favBtn.style.color = "";
  }
}

function renderFavoritePanel() {
  const body = document.getElementById("favoriteBody");
  if (state.favorites.length === 0) {
    body.innerHTML = '<div class="empty-state">暂无收藏，点击 ☆ 收藏单词</div>';
    return;
  }
  body.innerHTML = state.favorites.map((item, i) => `
    <div class="favorite-item">
      <div class="word-pair">
        <span class="en">${item.en}</span>
        <span class="cn">${item.cn}</span>
        <span style="font-size:11px;color:#ffc107">${getDifficultyStars(item.difficulty)}</span>
        ${item.note ? `<span style="font-size:12px;color:var(--text-secondary)">(${item.note})</span>` : ""}
      </div>
      <button class="btn btn-primary btn-sm" onclick="studyFavoriteItem(${i})">学习</button>
      <button class="btn btn-danger btn-sm" onclick="removeFavoriteItem(${i})">删除</button>
    </div>
  `).join("");
}

function studyFavoriteItem(index) {
  state.currentWord = state.favorites[index];
  state.history.push(state.currentWord);
  state.historyIndex = state.history.length - 1;
  showQuestion(state.currentWord);
  document.getElementById("question").innerText =
    "【收藏学习】" + (state.mode === "cn2en" ? "中文：" + state.currentWord.cn : "英文：" + state.currentWord.en);
}

function removeFavoriteItem(index) {
  state.favorites.splice(index, 1);
  renderFavoritePanel();
  document.getElementById("favoriteCount").innerText = state.favorites.length;
  saveState();
}

function updateCategoryUI() {
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  const cats = ["all","politics","tech","culture","campus","medical","economy","environment","writing","research"];
  const idx = cats.indexOf(state.category);
  if (idx >= 0) document.querySelectorAll(".cat-btn")[idx]?.classList.add("active");
}

function updateModeUI() {
  document.getElementById("modeText").innerText = state.mode === "cn2en" ? "中译英" : "英译中";
  const seqBtn = document.getElementById("modeSeqBtn");
  const randBtn = document.getElementById("modeRandBtn");
  if (state.isSeqMode) {
    seqBtn.classList.add("active"); seqBtn.style.background = "var(--primary)"; seqBtn.style.color = "#fff";
    randBtn.classList.remove("active"); randBtn.style.background = ""; randBtn.style.color = "";
  } else {
    randBtn.classList.add("active"); randBtn.style.background = "var(--primary)"; randBtn.style.color = "#fff";
    seqBtn.classList.remove("active"); seqBtn.style.background = ""; seqBtn.style.color = "";
  }
}

function updateNavUI() {
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const navInfo = document.getElementById("navInfo");
  if (state.isSeqMode) {
    const list = getFilteredList();
    const total = list.length;
    prevBtn.disabled = state.seqIndex <= 0;
    nextBtn.disabled = state.seqIndex >= total - 1 || total === 0;
    navInfo.innerText = total > 0 ? `${state.seqIndex + 1} / ${total}` : "0 / 0";
  } else {
    prevBtn.disabled = state.historyIndex <= 0;
    nextBtn.disabled = state.historyIndex >= state.history.length - 1;
    navInfo.innerText = "";
  }
}

function renderErrorPanel() {
  const body = document.getElementById("errorBody");
  if (state.errorList.length === 0) {
    body.innerHTML = '<div class="empty-state">暂无错题，继续加油！🎉</div>';
    return;
  }
  body.innerHTML = state.errorList.map((item, i) => `
    <div class="error-item">
      <div class="word-pair">
        <span class="en">${item.en}</span>
        <span class="cn">${item.cn}</span>
        ${item.note ? `<span style="font-size:12px;color:var(--text-secondary)">(${item.note})</span>` : ""}
      </div>
      <span class="error-count">错${item.count || 1}次</span>
      <button class="btn btn-warning btn-sm" onclick="redoErrorItem(${i})">重做</button>
      <button class="btn btn-danger btn-sm" onclick="removeErrorItem(${i})">删除</button>
    </div>
  `).join("");
}

// ==================== 照打正确答案区域 ====================
function showRewriteArea(correctAns) {
  state.rewritePhase = true;
  state.rewriteCorrectAns = correctAns;
  document.getElementById("answerRow").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  const area = document.getElementById("rewriteArea");
  area.style.display = "block";
  area.innerHTML = `
    <div class="rewrite-box">
      <div class="rewrite-title">✍️ 请照着打一遍正确答案，加深记忆：</div>
      <div class="rewrite-target">${correctAns}</div>
      <div class="rewrite-input-row">
        <input type="text" id="rewriteInput" placeholder="在此输入上面的正确答案" autocomplete="off">
        <button class="btn btn-success" id="rewriteConfirmBtn" onclick="confirmRewrite()">确认</button>
      </div>
      <div class="rewrite-feedback" id="rewriteFeedback"></div>
    </div>
  `;

  // 实时对比输入
  const ri = document.getElementById("rewriteInput");
  ri.addEventListener("input", onRewriteInput);
  ri.addEventListener("keydown", function(e) {
    if (e.key === "Enter") { e.preventDefault(); confirmRewrite(); }
  });
  setTimeout(() => ri.focus(), 100);
}

function onRewriteInput() {
  const input = document.getElementById("rewriteInput");
  const feedback = document.getElementById("rewriteFeedback");
  if (!input) return;

  if (isStrictMatch(input.value, state.rewriteCorrectAns)) {
    input.className = "match";
    feedback.innerHTML = '<span style="color:var(--success)">✅ 完全正确！点击确认或按回车继续</span>';
  } else if (input.value.length >= state.rewriteCorrectAns.length) {
    input.className = "mismatch";
    feedback.innerHTML = '<span style="color:var(--error)">❌ 还没有完全一致，请仔细对照</span>';
  } else {
    input.className = "";
    feedback.innerText = "";
  }
}

function confirmRewrite() {
  if (!state.rewritePhase) return;
  const input = document.getElementById("rewriteInput");
  if (!input) return;

  if (!isStrictMatch(input.value, state.rewriteCorrectAns)) {
    input.className = "mismatch";
    document.getElementById("rewriteFeedback").innerHTML =
      '<span style="color:var(--error)">❌ 请确保输入与正确答案完全一致！注意大小写和标点</span>';
    input.focus();
    return;
  }

  // 照打成功，进入下一题
  hideRewriteArea();
  goNextQuestion();
}

function hideRewriteArea() {
  state.rewritePhase = false;
  document.getElementById("rewriteArea").style.display = "none";
  document.getElementById("rewriteArea").innerHTML = "";
  document.getElementById("answerRow").style.display = "";
  document.getElementById("submitBtn").style.display = "";
  state.isSubmitting = false;
  document.getElementById("submitBtn").disabled = false;
}

function goNextQuestion() {
  if (state.isSeqMode) {
    const list = getFilteredList();
    if (state.seqIndex < list.length - 1) {
      nextQuestion();
    } else {
      document.getElementById("question").innerText = "🎉 已完成该分类全部题目！";
      document.getElementById("catTag").style.display = "none";
    }
  } else {
    getQuestion();
  }
}

// ==================== 核心逻辑 ====================
function showQuestion(word) {
  if (!word) return;
  state.currentWord = word;
  const qDom = document.getElementById("question");
  const catTag = document.getElementById("catTag");
  const diffTag = document.getElementById("diffTag");
  const resDom = document.getElementById("resText");
  const inputDom = document.getElementById("userInput");
  const quizBox = document.getElementById("quizBox");
  const exampleText = document.getElementById("exampleText");

  hideRewriteArea();
  inputDom.value = "";
  resDom.innerText = "";
  resDom.className = "result";
  quizBox.className = "quiz-box";
  document.getElementById("answerRow").style.display = "";
  document.getElementById("submitBtn").style.display = "";
  state.isSubmitting = false;
  document.getElementById("submitBtn").disabled = false;
  exampleText.style.display = "none";
  state.showExample = false;
  document.getElementById("exampleBtn").classList.remove("active");
  document.getElementById("exampleBtn").style.background = "";
  document.getElementById("exampleBtn").style.color = "";

  catTag.style.display = "inline-block";
  catTag.innerText = getCatName(word.cat);

  if (word.difficulty) {
    diffTag.style.display = "inline-block";
    diffTag.innerText = getDifficultyStars(word.difficulty);
  } else {
    diffTag.style.display = "none";
  }

  if (state.mode === "cn2en") {
    qDom.innerText = "中文：" + word.cn;
  } else {
    qDom.innerText = "英文：" + word.en;
  }

  updateFavBtnState();
  inputDom.focus();
  updateNavUI();
  saveState();
}

function getQuestion() {
  const list = getFilteredList();
  if (list.length === 0) { alert("该分类暂无词汇！"); return; }

  if (state.isSeqMode) {
    if (state.seqIndex < 0 || state.seqIndex >= list.length) state.seqIndex = 0;
    state.currentWord = list[state.seqIndex];
  } else {
    const idx = Math.floor(Math.random() * list.length);
    state.currentWord = list[idx];
    state.seqIndex = list.indexOf(state.currentWord);
  }

  if (state.historyIndex < state.history.length - 1) {
    state.history = state.history.slice(0, state.historyIndex + 1);
  }
  state.history.push(state.currentWord);
  state.historyIndex = state.history.length - 1;

  showQuestion(state.currentWord);
}

function prevQuestion() {
  if (state.rewritePhase) return;
  if (state.isSeqMode) {
    const list = getFilteredList();
    if (state.seqIndex > 0) { state.seqIndex--; state.currentWord = list[state.seqIndex]; showQuestion(state.currentWord); }
  } else {
    if (state.historyIndex > 0) { state.historyIndex--; state.currentWord = state.history[state.historyIndex]; showQuestion(state.currentWord); }
  }
}

function nextQuestion() {
  if (state.rewritePhase) return;
  if (state.isSeqMode) {
    const list = getFilteredList();
    if (state.seqIndex < list.length - 1) { state.seqIndex++; state.currentWord = list[state.seqIndex]; showQuestion(state.currentWord); }
  } else {
    if (state.historyIndex < state.history.length - 1) { state.historyIndex++; state.currentWord = state.history[state.historyIndex]; showQuestion(state.currentWord); }
  }
}

function checkAnswer() {
  if (state.isSubmitting) return;
  if (state.rewritePhase) return;
  if (!state.currentWord) {
    document.getElementById("resText").innerText = "请先抽题！";
    document.getElementById("resText").className = "result show";
    return;
  }

  state.isSubmitting = true;
  document.getElementById("submitBtn").disabled = true;

  const userAns = document.getElementById("userInput").value;
  const resDom = document.getElementById("resText");
  const quizBox = document.getElementById("quizBox");
  let correctAns, isCorrect = false;

  if (state.mode === "cn2en") {
    correctAns = state.currentWord.en;
    isCorrect = isFuzzyMatch(userAns, correctAns);
  } else {
    correctAns = state.currentWord.cn;
    isCorrect = isFuzzyMatch(userAns, correctAns);
  }

  state.totalAnswered++;
  state.todayAnswered++;
  resDom.className = "result show";

  if (isCorrect) {
    state.rightAnswered++;
    state.todayCorrect++;
    resDom.classList.add("right");
    quizBox.className = "quiz-box correct";
    playSound('correct');
    const praise = ["🎉 回答正确，太棒啦！", "✅ 完全正确，继续加油！", "👍 记得很牢，真不错！", "💪 很厉害！"];
    resDom.innerText = praise[Math.floor(Math.random() * praise.length)];
    if (state.currentWord.note) {
      resDom.innerHTML += `<div class="paraphrase">💡 释义：${state.currentWord.note}</div>`;
    }

    // 答对 → 清空输入框 → 自动下一题
    updateStats();
    renderErrorPanel();
    saveState();

    setTimeout(() => {
      document.getElementById("userInput").value = "";
      state.isSubmitting = false;
      document.getElementById("submitBtn").disabled = false;
      goNextQuestion();
    }, 1200);

  } else {
    // 答错 → 显示正确答案 → 进入照打模式
    state.wrongAnswered++;
    resDom.classList.add("wrong");
    quizBox.className = "quiz-box incorrect";
    playSound('wrong');
    let msg = `❌ 答错啦，正确答案是：<strong>${correctAns}</strong>`;
    if (state.currentWord.note) {
      msg += `<div class="paraphrase">💡 释义：${state.currentWord.note}</div>`;
    }
    resDom.innerHTML = msg;

    // 加入错题本
    const existIdx = state.errorList.findIndex(
      e => e.en === state.currentWord.en && e.cn === state.currentWord.cn
    );
    if (existIdx >= 0) {
      state.errorList[existIdx].count = (state.errorList[existIdx].count || 1) + 1;
    } else {
      state.errorList.push({ en: state.currentWord.en, cn: state.currentWord.cn, cat: state.currentWord.cat, note: state.currentWord.note || "", difficulty: state.currentWord.difficulty || 1, example: state.currentWord.example || "", count: 1 });
    }

    updateStats();
    renderErrorPanel();
    saveState();

    // 清空输入框，显示照打区域
    document.getElementById("userInput").value = "";
    setTimeout(() => {
      showRewriteArea(correctAns);
    }, 600);
  }
}

// ==================== 事件 ====================
document.getElementById("userInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !state.rewritePhase) {
    e.preventDefault();
    checkAnswer();
  }
});

// 键盘快捷键
document.addEventListener("keydown", function(e) {
  // 如果在输入框中，不处理快捷键（除了Esc）
  if (document.activeElement.tagName === "INPUT" && e.key !== "Escape") {
    return;
  }
  
  switch(e.key) {
    case "Escape":
      // 清空输入框
      document.getElementById("userInput").value = "";
      if (state.rewritePhase) {
        hideRewriteArea();
      }
      break;
    case "ArrowLeft":
      // 上一题
      if (!state.rewritePhase) prevQuestion();
      break;
    case "ArrowRight":
      // 下一题
      if (!state.rewritePhase) nextQuestion();
      break;
    case " ":
      // 随机抽题（空格键）
      if (!state.rewritePhase && document.activeElement.tagName !== "INPUT") {
        e.preventDefault();
        getQuestion();
      }
      break;
    case "s":
    case "S":
      // 发音
      if (!state.rewritePhase && document.activeElement.tagName !== "INPUT") {
        speakWord();
      }
      break;
    case "f":
    case "F":
      // 收藏
      if (!state.rewritePhase && document.activeElement.tagName !== "INPUT") {
        toggleFavorite();
      }
      break;
  }
});

// 系统主题自动切换
if (window.matchMedia) {
  const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
  darkModeMediaQuery.addEventListener('change', function(e) {
    if (!localStorage.getItem(STORAGE_KEY) || !JSON.parse(localStorage.getItem(STORAGE_KEY)).theme) {
      setTheme(e.matches ? 'dark' : 'light');
    }
  });
}

// 音效系统
let audioContext = null;
function initAudio() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playSound(type) {
  try {
    initAudio();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    gainNode.gain.value = 0.3;
    
    if (type === 'correct') {
      oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
      oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
      oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.4);
    } else if (type === 'wrong') {
      oscillator.frequency.setValueAtTime(311.13, audioContext.currentTime); // Eb4
      oscillator.frequency.setValueAtTime(293.66, audioContext.currentTime + 0.15); // D4
      oscillator.type = 'sawtooth';
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.3);
    } else if (type === 'click') {
      oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.05);
    }
  } catch(e) {}
}

// ==================== 分类 & 模式切换 ====================
function setCategory(cat) {
  state.category = cat;
  state.seqIndex = -1;
  state.history = [];
  state.historyIndex = -1;
  hideRewriteArea();
  updateCategoryUI();
  updateNavUI();
  document.getElementById("question").innerText = "分类已切换，请抽题开始答题";
  document.getElementById("resText").innerText = "";
  document.getElementById("resText").className = "result";
  document.getElementById("quizBox").className = "quiz-box";
  document.getElementById("catTag").style.display = "none";
  document.getElementById("userInput").value = "";
  saveState();
}

function switchMode(mode) {
  state.mode = mode;
  hideRewriteArea();
  updateModeUI();
  document.getElementById("question").innerText = "模式已切换，请抽题开始答题";
  document.getElementById("resText").innerText = "";
  document.getElementById("resText").className = "result";
  document.getElementById("quizBox").className = "quiz-box";
  document.getElementById("userInput").value = "";
  saveState();
}

function toggleSeqMode() {
  state.isSeqMode = !state.isSeqMode;
  state.seqIndex = -1;
  state.history = [];
  state.historyIndex = -1;
  hideRewriteArea();
  updateModeUI();
  updateNavUI();
  document.getElementById("question").innerText = state.isSeqMode ? "已切换为顺序刷题，请抽题" : "已切换为随机刷题，请抽题";
  document.getElementById("resText").innerText = "";
  document.getElementById("resText").className = "result";
  document.getElementById("quizBox").className = "quiz-box";
  document.getElementById("catTag").style.display = "none";
  saveState();
}

// ==================== 错题本 ====================
function redoError() {
  if (state.errorList.length === 0) {
    document.getElementById("resText").innerText = "暂无错题！";
    document.getElementById("resText").className = "result show";
    return;
  }
  const idx = Math.floor(Math.random() * state.errorList.length);
  state.currentWord = state.errorList[idx];
  state.history.push(state.currentWord);
  state.historyIndex = state.history.length - 1;
  showQuestion(state.currentWord);
  document.getElementById("question").innerText =
    "【错题重做】" + (state.mode === "cn2en" ? "中文：" + state.currentWord.cn : "英文：" + state.currentWord.en);
}

function redoErrorItem(index) {
  state.currentWord = state.errorList[index];
  state.history.push(state.currentWord);
  state.historyIndex = state.history.length - 1;
  showQuestion(state.currentWord);
  document.getElementById("question").innerText =
    "【错题重做】" + (state.mode === "cn2en" ? "中文：" + state.currentWord.cn : "英文：" + state.currentWord.en);
}

function removeErrorItem(index) {
  state.errorList.splice(index, 1);
  renderErrorPanel();
  document.getElementById("errorCount").innerText = state.errorList.length;
  saveState();
}

function clearErrors() {
  state.errorList = [];
  document.getElementById("errorCount").innerText = "0";
  renderErrorPanel();
  document.getElementById("resText").innerText = "错题本已清空！";
  document.getElementById("resText").className = "result show";
  saveState();
}

function exportErrors() {
  if (state.errorList.length === 0) {
    alert("错题本为空，无需导出！");
    return;
  }
  const data = JSON.stringify(state.errorList, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cet4_errors_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importErrors(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (Array.isArray(imported)) {
        const count = imported.length;
        state.errorList = [...state.errorList, ...imported];
        renderErrorPanel();
        document.getElementById("errorCount").innerText = state.errorList.length;
        saveState();
        alert(`成功导入 ${count} 道错题！`);
      } else {
        alert("文件格式错误！");
      }
    } catch(err) {
      alert("导入失败：" + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function exportFavorites() {
  if (state.favorites.length === 0) {
    alert("收藏夹为空，无需导出！");
    return;
  }
  const data = JSON.stringify(state.favorites, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cet4_favorites_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importFavorites(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (Array.isArray(imported)) {
        const count = imported.length;
        state.favorites = [...state.favorites, ...imported];
        renderFavoritePanel();
        document.getElementById("favoriteCount").innerText = state.favorites.length;
        saveState();
        alert(`成功导入 ${count} 个收藏单词！`);
      } else {
        alert("文件格式错误！");
      }
    } catch(err) {
      alert("导入失败：" + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function toggleErrorPanel() {
  document.getElementById("errorPanel").classList.toggle("open");
}

function init() {
  loadState();
  setTheme(state.theme);
  updateStats();
  updateCategoryUI();
  updateModeUI();
  updateDifficultyUI();
  updateNavUI();
  renderErrorPanel();
  renderFavoritePanel();
  
  // 检查每日日期，重置今日统计
  const today = new Date().toDateString();
  if (state.todayDate !== today) {
    state.todayDate = today;
    state.todayAnswered = 0;
    state.todayCorrect = 0;
    saveState();
  }
}
init();

        console.log('ServiceWorker registered:', registration.scope);
      })
      .catch(function(err) {

}
</script>
